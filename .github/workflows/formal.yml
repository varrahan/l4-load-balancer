name: Formal Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  formal:
    name: SymbiYosys BMC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: '2024-01-01' # You can also change this to 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify toolchain
        run: |
          sby --version
          yosys --version
          yices-smt2 --version || yices --version || true

      - name: Run sync_fifo formal
        run: sby -f formal/sync_fifo/sync_fifo.sby
        working-directory: ${{ github.workspace }}

      - name: Run meta_fifo formal
        run: sby -f formal/meta_fifo/meta_fifo.sby
        working-directory: ${{ github.workspace }}

      - name: Run tuple_extractor formal
        run: sby -f formal/tuple_extractor/tuple_extractor.sby
        working-directory: ${{ github.workspace }}

      - name: Run toeplitz_core formal
        run: sby -f formal/toeplitz_core/toeplitz_core.sby
        working-directory: ${{ github.workspace }}

      - name: Run header_modifier formal
        run: sby -f formal/header_modifier/header_modifier.sby
        working-directory: ${{ github.workspace }}

      - name: Run fib_bram_controller formal
        run: sby -f formal/fib_bram_controller/fib_bram_controller.sby
        working-directory: ${{ github.workspace }}

      - name: Run token_bucket_limiter formal
        run: sby -f formal/token_bucket_limiter/token_bucket_limiter.sby
        working-directory: ${{ github.workspace }}

      - name: Upload counterexample traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: formal-counterexamples
          path: |
            formal/**/work/engine_0/trace*.vcd
            formal/**/work/logfile.txt
          retention-days: 7